name: Git Extractor

description: Extract commit, PR, and issue metadata using Octokit and expose outputs for downstream jobs.
author: Your Team

inputs:
  github-token:
    description: GitHub token with read access to the repository
    required: true
    default: ${{ github.token }}
  owner:
    description: Repository owner. Defaults to current repository owner.
    required: false
  repo:
    description: Repository name. Defaults to current repository name.
    required: false
  commit-sha:
    description: Commit SHA to fetch. Defaults to github.sha.
    required: false
  pr-number:
    description: Pull request number to fetch. Defaults to pull_request event number or first PR associated to commit.
    required: false
  issue-number:
    description: Issue number to fetch. Defaults to issues event number.
    required: false
  include-dora-metrics:
    description: Whether to calculate DORA metrics from Actions workflow runs.
    required: false
    default: "true"
  dora-lookback-days:
    description: Number of trailing days used for DORA metric calculations.
    required: false
    default: "30"
  dora-branch:
    description: Branch used when querying deployment workflow runs for DORA metrics.
    required: false
    default: main
  dora-workflow-id:
    description: Optional deployment workflow id or file name (for example deploy.yml) used to scope DORA metrics.
    required: false

outputs:
  commit-sha:
    description: Commit SHA
  commit-url:
    description: Commit URL
  commit-message:
    description: Commit message
  commit-author:
    description: Commit author login or name
  commit-json:
    description: Commit details as JSON string
  pr-id:
    description: Pull request ID if resolved
  pr-number:
    description: Pull request number if resolved
  pr-url:
    description: Pull request URL
  pr-title:
    description: Pull request title
  pr-state:
    description: Pull request state
  pr-json:
    description: Pull request details as JSON string
  open-pr-count:
    description: Count of all open pull requests in the repository
  open-prs-json:
    description: Open pull requests as a JSON array
  closed-pr-count:
    description: Count of all closed pull requests in the repository
  closed-prs-json:
    description: Closed pull requests as a JSON array
  dora-lookback-days:
    description: Lookback window used for DORA calculations
  dora-branch:
    description: Branch used for DORA run selection
  dora-workflow-id:
    description: Workflow id/name filter used for DORA calculations
  dora-deployment-count:
    description: Total completed deployments in the lookback period
  dora-successful-deployment-count:
    description: Successful deployments in the lookback period
  dora-failed-deployment-count:
    description: Failed deployments in the lookback period
  dora-deployment-frequency-per-day:
    description: Deployment frequency per day across the lookback period
  dora-change-failure-rate:
    description: Change failure rate percentage
  dora-lead-time-hours:
    description: Mean lead time for changes in hours
  dora-mttr-hours:
    description: Mean time to recovery in hours
  dora-json:
    description: Complete DORA metrics payload as JSON string
  issue-number:
    description: Issue number if provided/resolved
  issue-url:
    description: Issue URL
  issue-title:
    description: Issue title
  issue-state:
    description: Issue state
  issue-json:
    description: Issue details as JSON string

runs:
  using: node20
  main: dist/index.js
